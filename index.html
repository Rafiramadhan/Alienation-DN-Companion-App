<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alienation Dragon Nest - Monster Card Database</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230b0906'/><path d='M16 3.5 L28.5 16 L16 28.5 L3.5 16 Z' fill='%23e7bd5e' stroke='%23b8892f'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0906; --bg2:#100c07; --panel:#17110b; --panel2:#1f1710;
    --line:#3a2c18; --line2:#5a4526;
    --txt:#ece2cf; --mut:#a3937a;
    --gold:#e7bd5e; --gold2:#f4d488; --gold-deep:#b8892f; --accent:#e7bd5e;
    --crimson:#c0392b;
    --magic:#c2c9d4; --rare:#5aa2ff; --epic:#c072ff; --unique:#f4b13c; --legend:#ff5f4d;
    --serif:'Cinzel','Trajan Pro','Times New Roman',serif;
    --sans:"Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html{scrollbar-color:var(--gold-deep) var(--bg2)}
  body{margin:0;min-height:100vh;color:var(--txt);font:14px/1.55 var(--sans);
    -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1100px 480px at 50% -8%, rgba(231,189,94,.10), transparent 70%),
      radial-gradient(900px 620px at 50% 118%, rgba(192,57,43,.07), transparent 70%),
      linear-gradient(180deg,#0d0a06,#0b0906);
    background-attachment:fixed;}

  /* ---------- hero header ---------- */
  header{position:relative;padding:34px 22px 0;text-align:center;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(31,23,13,.55),rgba(13,10,6,0));}
  header::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,var(--gold-deep) 18%,var(--gold2) 50%,var(--gold-deep) 82%,transparent);}
  .dn-logo{display:block;margin:4px auto 8px;width:250px;max-width:80%;height:auto;
    filter:drop-shadow(0 3px 16px rgba(231,189,94,.30)) drop-shadow(0 1px 2px rgba(0,0,0,.6));}
  .kicker{font-family:var(--serif);color:var(--crimson);font-weight:700;
    letter-spacing:6px;font-size:12.5px;text-transform:uppercase;margin-bottom:8px;
    text-shadow:0 1px 6px rgba(192,57,43,.4)}
  h1{margin:0;font-family:var(--serif);font-weight:700;font-size:38px;letter-spacing:3px;
    line-height:1.08;
    background:linear-gradient(180deg,#f9e9bf,#e7bd5e 48%,#b8892f);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 22px rgba(231,189,94,.16)}
  .h1sub{font-family:var(--serif);color:var(--gold);letter-spacing:4px;
    font-size:15px;text-transform:uppercase;margin-top:8px;font-weight:600}
  .sub{color:var(--mut);font-size:13px;margin:12px auto 0;max-width:620px}
  .divider{display:flex;align-items:center;justify-content:center;gap:14px;
    max-width:520px;margin:20px auto 0}
  .divider span{height:1px;flex:1}
  .divider span:first-child{background:linear-gradient(90deg,transparent,var(--line2))}
  .divider span:last-child{background:linear-gradient(90deg,var(--line2),transparent)}
  .divider i{font-style:normal;color:var(--gold);font-size:13px;
    text-shadow:0 0 10px rgba(231,189,94,.55)}

  /* ---------- tabs ---------- */
  .tabs{display:flex;gap:10px;justify-content:center;margin-top:22px;transform:translateY(1px)}
  .tab{font-family:var(--serif);padding:11px 24px;border:1px solid var(--line2);border-bottom:none;
    border-radius:11px 11px 0 0;background:linear-gradient(180deg,#1a130b,#120d07);
    color:var(--mut);cursor:pointer;font-size:12.5px;font-weight:700;letter-spacing:1.5px;
    text-transform:uppercase;transition:.15s}
  .tab:hover{color:var(--gold2);border-color:var(--gold-deep)}
  .tab.active{color:#1a1206;border-color:var(--gold-deep);
    background:linear-gradient(180deg,var(--gold2),var(--gold-deep));
    box-shadow:0 -3px 18px rgba(231,189,94,.28)}

  .wrap{max-width:1100px;margin:0 auto;padding:24px 22px 64px}

  /* ---------- controls ---------- */
  .controls{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;
    background:linear-gradient(180deg,#181209,#130e08);
    border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    box-shadow:0 8px 26px rgba(0,0,0,.45),inset 0 1px 0 rgba(231,189,94,.06)}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-family:var(--serif);font-size:10.5px;text-transform:uppercase;
    letter-spacing:1.5px;color:var(--gold-deep);font-weight:600}
  select,input{background:#120d07;color:var(--txt);border:1px solid var(--line2);
    border-radius:8px;padding:9px 11px;font-size:14px;outline:none;min-width:150px}
  select:focus,input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(231,189,94,.14)}
  .field.grow{flex:1;min-width:180px}
  .field.grow input{width:100%}
  ::placeholder{color:#6f6350}

  .count{color:var(--mut);font-size:12.5px;margin:18px 2px 10px}
  .count b{color:var(--gold2);font-weight:700}

  /* ---------- tables ---------- */
  table{width:100%;border-collapse:collapse;
    background:linear-gradient(180deg,#171009,#120d07);
    border:1px solid var(--line);border-radius:14px;overflow:hidden;
    box-shadow:0 8px 26px rgba(0,0,0,.4)}
  thead th{background:linear-gradient(180deg,#251b0e,#1b130a);text-align:left;
    padding:11px 13px;font-size:11.5px;font-family:var(--serif);
    text-transform:uppercase;letter-spacing:1px;color:var(--gold);
    border-bottom:1px solid var(--line2);cursor:pointer;user-select:none;white-space:nowrap}
  thead th.num{text-align:right}
  thead th .arr{color:var(--gold2);font-size:10px}
  tbody td{padding:10px 13px;border-bottom:1px solid rgba(90,69,38,.30);vertical-align:top}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.card{cursor:pointer;transition:background .12s}
  tbody tr.card:hover{background:rgba(231,189,94,.06)}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .cno{color:var(--mut);font-variant-numeric:tabular-nums}
  .cname{font-weight:600;color:#f3ead7}
  .nest{color:var(--mut);font-size:12.5px}
  .stat{color:var(--gold)}
  th.r-magic,td.r-magic{color:var(--magic)} th.r-rare,td.r-rare{color:var(--rare)}
  th.r-epic,td.r-epic{color:var(--epic)} th.r-unique,td.r-unique{color:var(--unique)}
  th.r-legend,td.r-legend{color:var(--legend)}
  td.sel{background:rgba(231,189,94,.12);font-weight:700}
  th.sel{background:rgba(231,189,94,.18)}
  .detail{background:#0f0b06}
  .detail td{padding:0}
  .detail table{border:none;border-radius:0;margin:0;box-shadow:none;background:#0f0b06}
  .detail thead th{background:#140f08}
  .empty{padding:44px;text-align:center;color:var(--mut);font-family:var(--serif);letter-spacing:.5px}
  .foot{color:var(--mut);font-size:11.5px;margin-top:26px;text-align:center;line-height:1.8}
  .foot code{background:var(--panel2);color:var(--gold2);padding:1px 6px;border-radius:5px}
  .pill{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;
    border:1px solid var(--gold-deep);color:var(--gold);margin-left:6px}
  .hidden{display:none}

  /* ---------- reference view ---------- */
  .cards2{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:18px}
  .rc{background:linear-gradient(180deg,#181209,#130e08);border:1px solid var(--line);
    border-radius:14px;padding:18px;box-shadow:0 8px 26px rgba(0,0,0,.4),inset 0 1px 0 rgba(231,189,94,.05)}
  .rc h3{margin:0 0 4px;font-size:17px;font-family:var(--serif);color:var(--gold);letter-spacing:.5px}
  .rc .rcsub{color:var(--mut);font-size:12px;margin-bottom:14px}
  .rc table{border:none;box-shadow:none;background:transparent}
  .rc thead th{cursor:default;background:transparent;border-bottom:1px solid var(--line)}
  .rc tbody td{border-bottom:1px solid rgba(90,69,38,.22)}
  .rc.full{grid-column:1/-1}
  .note{color:var(--mut);font-size:12px;margin-top:12px;font-style:italic}
  .bar{position:relative;background:#241a0e;border-radius:5px;height:15px;min-width:60px;
    border:1px solid var(--line)}
  .bar>span{position:absolute;left:0;top:0;bottom:0;border-radius:4px;opacity:.9;
    box-shadow:0 0 8px rgba(0,0,0,.4)}

  ::-webkit-scrollbar{width:12px;height:12px}
  ::-webkit-scrollbar-track{background:var(--bg2)}
  ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--gold-deep),#7a5a1f);
    border-radius:8px;border:2px solid var(--bg2)}

  /* ---------- character details ---------- */
  .ctools{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .ctools .spacer{flex:1}
  .csaved{color:var(--mut);font-size:11.5px;transition:color .2s}
  .btn{font-family:var(--serif);cursor:pointer;border-radius:9px;padding:9px 16px;
    font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
    border:1px solid var(--gold-deep);color:#1a1206;
    background:linear-gradient(180deg,var(--gold2),var(--gold-deep));transition:.15s}
  .btn:hover{filter:brightness(1.08);box-shadow:0 0 14px rgba(231,189,94,.3)}
  .btn.ghost{background:transparent;color:var(--gold)}
  .btn.ghost:hover{background:rgba(231,189,94,.08)}
  .btn.danger{border-color:#7a2a22;color:#ff9a8f;background:transparent}
  .btn.danger:hover{background:rgba(192,57,43,.12)}
  /* table hugs its content (no stretching) so checkbox columns stay narrow */
  /* break the roster out of the 1100px column so it uses the screen width */
  #charsView{width:min(1480px,94vw);margin-left:50%;transform:translateX(-50%)}
  .ctable-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;
    box-shadow:0 8px 26px rgba(0,0,0,.4);max-width:100%}
  table.ctable{border-radius:0;border:none;box-shadow:none;table-layout:fixed;width:100%}
  table.ctable thead th{white-space:normal;text-align:center;padding:9px 6px;font-size:11.5px;line-height:1.25;
    border-right:1px solid rgba(90,69,38,.25)}
  table.ctable thead th.wkh{padding:9px 3px;font-size:10.5px}
  table.ctable th.grp{color:var(--gold2);border-bottom:1px solid var(--line2)}
  table.ctable thead th.wk{background:#20180d;color:var(--gold2)}
  table.ctable tbody td{padding:0;border-bottom:1px solid rgba(90,69,38,.30);
    border-right:1px solid rgba(90,69,38,.16)}
  table.ctable tbody td input[type=text]{width:100%;min-width:0;background:transparent;border:none;
    color:var(--txt);padding:7px 6px;font-size:13px;outline:none;border-radius:0}
  table.ctable td.tnum input{text-align:right;font-variant-numeric:tabular-nums}
  table.ctable td input[type=text]:focus{background:rgba(231,189,94,.10);box-shadow:inset 0 0 0 1px var(--gold)}
  table.ctable .sticky{position:sticky;left:0;z-index:2;background:#171009}
  table.ctable thead th.sticky{z-index:3;background:#251b0e}
  table.ctable td.sticky input{min-width:0;font-weight:600;color:#f3ead7}
  table.ctable td.tchk{text-align:center;padding:0;background:rgba(231,189,94,.03)}
  table.ctable td.tchk input{width:17px;height:17px;margin:8px auto;cursor:pointer;
    accent-color:var(--gold);display:block}
  table.ctable td.act{text-align:center;padding:0 4px;border-right:none}
  .xbtn{cursor:pointer;color:var(--mut);border:none;background:none;font-size:15px;
    line-height:1;padding:7px 9px;border-radius:6px}
  .xbtn:hover{color:#ff7a6d;background:rgba(192,57,43,.12)}
  .cempty{padding:48px 24px;text-align:center;color:var(--mut);font-family:var(--serif);
    letter-spacing:.5px;line-height:1.9;border:1px dashed var(--line2);border-radius:14px}

  @media(max-width:560px){ h1{font-size:28px} .tab{padding:10px 15px} }
</style>
</head>

};

$('q').oninput      = e => { state.q = e.target.value.trim().toLowerCase(); render(); };

// ---- build filtered rows ----
function rows(){
  const ri = R.indexOf(state.rarity);
  const allMode = state.stat===ALL;
  let out = [];
  for(const c of DB.cards){
    if(state.nest !== 'All' && c.nest !== state.nest) continue;
    if(state.q && !c.name.toLowerCase().includes(state.q)) continue;
    if(allMode){
      for(const s of c.stats)
        out.push({ no:c.no, name:c.name, nest:c.nest, stat:s.stat, values:s.values, card:c });
    } else {
      const s = c.stats.find(x => x.stat === state.stat);
      if(!s) continue;
      out.push({ no:c.no, name:c.name, nest:c.nest, stat:s.stat, values:s.values, card:c });
    }
  }
  const dir = state.sort.dir, k = state.sort.key;
  out.sort((a,b)=>{
    if(k==='no'){ return dir*(a.no-b.no) || a.stat.localeCompare(b.stat); }
    if(k==='name'){ return dir*a.name.localeCompare(b.name) || a.no-b.no; }
    if(k==='nest'){ return dir*a.nest.localeCompare(b.nest) || a.no-b.no; }
    if(k==='stat'){ return dir*a.stat.localeCompare(b.stat) || a.no-b.no; }
    const av=a.values[ri]??-1, bv=b.values[ri]??-1;
    return dir*(av-bv) || a.no-b.no;
  });
  return out;
}

function th(label,key,extra=''){
  const active = state.sort.key===key;
  const arr = active ? (state.sort.dir<0?'▼':'▲') : '';
  return `<th data-k="${key}" class="${extra}">${label} <span class="arr">${arr}</span></th>`;
}

function valCells(values){
  return R.map((r,i)=>{
    const v = values[i]==null?'—':values[i];
    return `<td class="num r-${RKEY[i]} ${r===state.rarity?'sel':''}">${v}</td>`;
  }).join('');
}

function render(){
  const allMode = state.stat===ALL;
  const cols = 3 + (allMode?1:0) + R.length;
  const data = rows();

  const cardCount = new Set(data.map(d=>d.no)).size;
  $('count').innerHTML = allMode
    ? `Showing all <b>${cardCount}</b> cards · <b>${data.length}</b> stat lines`
      + `${state.nest!=='All'?` in <b>${state.nest}</b>`:''}`
      + `<span class="pill">sorted by ${state.sort.key==='rarity'?state.rarity:state.sort.key}</span>`
    : `Showing <b>${data.length}</b> card${data.length!==1?'s':''} with <b>${state.stat}</b>`
      + `${state.nest!=='All'?` in <b>${state.nest}</b>`:''}`
      + `<span class="pill">sorted by ${state.sort.key==='rarity'?state.rarity:state.sort.key}</span>`;

  if(!data.length){ $('results').innerHTML = `<div class="empty">No cards match. Try another stat or clear the search.</div>`; return; }

  const head = `<thead><tr>
      ${th('#','no','num')}
      ${th('Card','name')}
      ${th('Nest','nest')}
      ${allMode?th('Stat','stat'):''}
      ${R.map((r,i)=>`<th data-k="rarity" data-r="${r}" class="num r-${RKEY[i]} ${r===state.rarity?'sel':''}">${r} <span class="arr">${state.sort.key==='rarity'&&state.rarity===r?(state.sort.dir<0?'▼':'▲'):''}</span></th>`).join('')}
    </tr></thead>`;

  const body = data.map(row=>`
    <tr class="card" data-no="${row.no}">
      <td class="num cno">${row.no}</td>
      <td class="cname">${row.name}</td>
      <td class="nest">${row.nest}</td>
      ${allMode?`<td class="stat">${row.stat}</td>`:''}
      ${valCells(row.values)}
    </tr>`).join('');

  $('results').innerHTML = `<table>${head}<tbody>${body}</tbody></table>`;

  // header sorting
  $('results').querySelectorAll('thead th').forEach(el=>{
    el.onclick = ()=>{
      const k = el.dataset.k, r = el.dataset.r;
      if(k==='rarity' && r){ state.rarity = r; $('rarity').value = r; }
      const sameRarityCol = k==='rarity' && (!r || r===state.rarity);
      if(state.sort.key===k && (k!=='rarity' || sameRarityCol)){ state.sort.dir *= -1; }
      else { state.sort.key = k; state.sort.dir = (k==='name'||k==='nest'||k==='stat')?1:(k==='no'?1:-1); }
      render();
    };
  });

  // row expand -> all stats for that card
  $('results').querySelectorAll('tr.card').forEach(tr=>{
    tr.onclick = ()=>{
      const next = tr.nextElementSibling;
      if(next && next.classList.contains('detail')){ next.remove(); return; }
      const c = DB.cards.find(x=>x.no==tr.dataset.no);
      const inner = c.stats.map(s=>`<tr>
          <td class="stat">${s.stat}</td>${valCells(s.values)}
        </tr>`).join('');
      const d = document.createElement('tr');
      d.className='detail';
      d.innerHTML = `<td colspan="${cols}"><table><thead><tr>
          <th>All stats — ${c.name} <span class="pill">${c.nest}</span></th>
          ${R.map((r,i)=>`<th class="num r-${RKEY[i]} ${r===state.rarity?'sel':''}">${r}</th>`).join('')}
        </tr></thead><tbody>${inner}</tbody></table></td>`;
      tr.after(d);
    };
  });
}

// ---- reference view ----
function rk(name){ const i=R.indexOf(name); return i<0?'':`r-${RKEY[i]}`; }
function renderRef(){
  if($('refCards').dataset.done) return;

  const packRows = REF.packOdds.map(o=>`
    <tr><td class="${rk(o.rarity)}">${o.rarity}</td>
      <td class="num">${o.pct}%</td>
      <td style="width:45%"><div class="bar"><span class="${rk(o.rarity)}" style="width:${o.pct}%;background:currentColor"></span></div></td>
    </tr>`).join('');

  const boxRows = REF.boxOdds.map(o=>`
    <tr><td class="${rk(o.rarity)}">${o.rarity}</td>
      <td class="num">${o.roll}</td><td class="num">${o.tenth}</td></tr>`).join('');

  const mastRows = REF.mastery.map(m=>`
    <tr><td class="num cno">Lv.${m[0]}</td>
      <td class="num stat">+${m[1]}</td>
      <td class="num">${m[2]}</td></tr>`).join('');

  $('refCards').innerHTML = `
    <div class="rc">
      <h3>Unidentified Monster Card Pack</h3>
      <div class="rcsub">Rarity chance on each draw</div>
      <table><thead><tr><th>Rarity</th><th class="num">Chance</th><th></th></tr></thead>
        <tbody>${packRows}</tbody></table>
    </div>

    <div class="rc">
      <h3>Monster Card Box (Lv.40)</h3>
      <div class="rcsub">Per-roll odds, plus the guaranteed every-10th-roll table</div>
      <table><thead><tr><th>Rarity</th><th class="num">Each roll</th><th class="num">Every 10th</th></tr></thead>
        <tbody>${boxRows}</tbody></table>
      <div class="note">Contains only Card No. 1 – No. 37.</div>
    </div>

    <div class="rc full">
      <h3>Card Mastery</h3>
      <div class="rcsub">Bonus to the card's stats per mastery level, and the Crystal of Power cost</div>
      <table><thead><tr><th class="num">Level</th><th class="num">Stat increase</th><th class="num">Crystal of Power</th></tr></thead>
        <tbody>${mastRows}</tbody></table>
      <div class="note">Mastery level cap is raised to Lv.25 at Cap 70.</div>
    </div>`;
  $('refCards').dataset.done = '1';
}

];

let CHARS = loadChars();
function loadChars(){ try{ const r=localStorage.getItem(CHAR_KEY); const d=r?JSON.parse(r):[]; return Array.isArray(d)?d:[]; }catch(e){ return []; } }
let savedTimer=null;
function saveChars(){
  try{ localStorage.setItem(CHAR_KEY, JSON.stringify(CHARS)); }
  catch(e){ const el=$('csaved'); if(el) el.textContent='⚠ Could not save (storage full/blocked)'; return; }
  const el=$('csaved'); if(!el) return;
  el.textContent='✓ Saved to this browser';
  clearTimeout(savedTimer);
  savedTimer=setTimeout(()=>{ el.textContent='Stored only in this browser (localStorage)'; },1500);
}
function esc(v){ return String(v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function charHeaderHTML(){
  const F=CHAR_FIELDS; let top='<tr>', bottom='<tr>', i=0;
  while(i<F.length){
    const f=F[i];
    if(f.group){
      let j=i; while(j<F.length && F[j].group===f.group) j++;
      const wk = f.group==='Weekly';
      top += `<th class="grp${wk?' wk':''}" colspan="${j-i}">${f.group}</th>`;
      for(let x=i;x<j;x++) bottom += `<th${wk?' class="wkh"':''}>${F[x].label}</th>`;
      i=j;
    } else {
      top += `<th rowspan="2"${i===0?' class="sticky"':''}>${f.label}</th>`;
      i++;
    }
  }
  top += '<th rowspan="2"></th></tr>'; bottom += '</tr>';
  return `<thead>${top}${bottom}</thead>`;
}
function charRowHTML(c,i){
  let tds='';
  CHAR_FIELDS.forEach((f,idx)=>{
    if(f.type==='check'){
      tds += `<td class="tchk"><input type="checkbox" data-i="${i}" data-k="${f.k}"${c[f.k]?' checked':''}></td>`;
      return;
    }
    const cls=[]; if(idx===0) cls.push('sticky'); if(f.type==='num') cls.push('tnum');
    const val=c[f.k]==null?'':c[f.k];
    tds += `<td class="${cls.join(' ')}"><input data-i="${i}" data-k="${f.k}" type="text"`
         + `${f.type==='num'?' inputmode="decimal"':''} value="${esc(val)}"></td>`;
  });
  tds += `<td class="act"><button class="xbtn" data-del="${i}" title="Delete character">✕</button></td>`;
  return `<tr>${tds}</tr>`;
}
// relative column widths (used as proportions since the table is width:100%)
function colW(f){
  if(f.type==='check') return 48;
  if(f.k==='nickname') return 140;
  if(f.k==='voucher')  return 96;
  if(f.k==='jakard')   return 78;
  if(f.type==='text')  return 80;
  return 56; // numbers
}
function charColgroup(){
  const cols = CHAR_FIELDS.map(f=>`<col style="width:${colW(f)}px">`).join('');
  return `<colgroup>${cols}<col style="width:44px"></colgroup>`;
}
function renderChars(){
  const area=$('ctableArea'); if(!area) return;
  if(!CHARS.length){
    area.innerHTML='<div class="cempty">No characters yet.<br>'
      + 'Click <b>＋ Add character</b> to start your roster.<br>'
      + 'Everything you type saves automatically — in <b>this browser only</b>.</div>';
    return;
  }
  const rows=CHARS.map(charRowHTML).join('');
  area.innerHTML=`<div class="ctable-wrap"><table class="ctable">`
    +`${charColgroup()}${charHeaderHTML()}<tbody>${rows}</tbody></table></div>`;
}

// ---- toolbar + delegated editing (wired once) ----
$('cAdd').onclick=()=>{
  CHARS.push({}); saveChars(); renderChars();
  const last=$('ctableArea').querySelector('tbody tr:last-child input'); if(last) last.focus();
};
$('cClear').onclick=()=>{
  if(CHARS.length && confirm('Delete ALL characters from this browser? This cannot be undone.')){
    CHARS=[]; saveChars(); renderChars();
  }
};
$('cExport').onclick=()=>{
  const blob=new Blob([JSON.stringify(CHARS,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='dn-character-details.json'; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(a.href);
};
$('cResetWk').onclick=()=>{
  if(!CHARS.length) return;
  if(confirm('Uncheck all weekly activities for every character? (other data is kept)')){
    const wk=CHAR_FIELDS.filter(f=>f.type==='check').map(f=>f.k);
    CHARS.forEach(c=>wk.forEach(k=>{ c[k]=false; }));
    saveChars(); renderChars();
  }
};
$('cImport').onclick=()=>$('cFile').click();
$('cFile').onchange=e=>{
  const file=e.target.files[0]; if(!file){ return; }
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const data=JSON.parse(rd.result);
      if(!Array.isArray(data)) throw new Error('not an array');
      if(CHARS.length && !confirm('Replace your current roster with the imported file?')){ e.target.value=''; return; }
      CHARS=data; saveChars(); renderChars();
    }catch(err){ alert('That file is not a valid character-details export.'); }
    finally{ e.target.value=''; }
  };
  rd.readAsText(file);
};
$('ctableArea').addEventListener('input',e=>{
  const inp=e.target.closest('input'); if(!inp) return;
  const i=+inp.dataset.i, k=inp.dataset.k;
  if(CHARS[i]){ CHARS[i][k] = inp.type==='checkbox' ? inp.checked : inp.value; saveChars(); }
});
$('ctableArea').addEventListener('click',e=>{
  const b=e.target.closest('[data-del]'); if(!b) return;
  const i=+b.dataset.del;
  const nm=(CHARS[i]&&CHARS[i].nickname)?` "${CHARS[i].nickname}"`:'';
  if(confirm(`Delete character${nm}?`)){ CHARS.splice(i,1); saveChars(); renderChars(); }
});

render();
</script>
</body>
</html>
